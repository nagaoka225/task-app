version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskapp-php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
      - AUTH_CODE=${AUTH_CODE}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLIC_KEY=${SUPABASE_PUBLIC_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - taskapp

  nginx:
    image: nginx:alpine
    container_name: taskapp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - taskapp

networks:
  taskapp:
    driver: bridge
